<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon | ROAR — Annual Prefects' Day</title>
<link rel="icon" href="assets/logo.png">
<link rel="stylesheet" href="base.css">
</head>
<body style="overflow: hidden;">

<!-- ============ PRELOADER ============ -->
<div id="preloader">
  <div class="pre-emblem">
    <img src="assets/Lotus .png" alt="ROAR" class="pre-logo">
  </div>
  <div class="pre-bar"><span></span></div>
</div>

<!-- ============ HERO / COMING SOON ============ -->
<header class="hero-container" id="hero" style="justify-content: center; text-align: center;">
  <!-- Background relies on .hero-bg from base.css -->
  <div class="hero-bg"></div>
  <div class="hero-grid-overlay"></div>
  
  <div class="wrap hero-content reveal is-visible" style="display: flex; flex-direction: column; align-items: center; margin: 0 auto; max-width: 100%;">
    
    <!-- Centered Logo -->
    <img src="assets/logo.png" alt="ROAR event logo" style="width: 180px; max-width: 80vw; margin-bottom: 30px;">
    
    <!-- Centered Title -->
    <h1 class="hero-title" style="text-align: center;">COMING SOON</h1>
    
  </div>
</header>

<!-- Fallback script to clear preloader if script.js relies on removed elements -->
<script>
  window.addEventListener('load', function() {
    const preloader = document.getElementById('preloader');
    if (preloader) {
      setTimeout(() => { 
        preloader.classList.add('hidden'); 
      }, 500);
    }
  });
</script>
</body>
</html>
